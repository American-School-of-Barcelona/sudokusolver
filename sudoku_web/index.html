<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="./styles.css?v=20260320a" />
</head>
<body>
  <main class="shell">
    <div class="outer-card">
      <div class="title">Sudoku Solver</div>

      <div class="inner-panel">
        <div class="content">
          <div class="board-area">
            <div class="board-wrap">
              <div id="board" class="board" aria-label="Sudoku board"></div>
            </div>
          </div>

          <div class="side">
            <div class="hint-card" aria-live="polite">
              <div id="line1" class="hint-title">Naked Single</div>

              <div class="hint-text" id="line2">
                Cell (r5, c6) has only one possible value.
              </div>

              <div class="hint-text" id="line3">
                In its row, column, and 3×3 box, every other digit is excluded, so the value must be 4.
              </div>

              
            </div>

            <input type="file" id="ocrInput" accept="image/*" style="display:none" />
            <div class="buttons">
              <button id="btnImport" class="btn btn-ghost">Import New Grid</button>
              <button id="btnOCR" class="btn btn-ghost">Import from Screenshot</button>
              <button id="btnAnalyze" class="btn btn-primary">Analyze / Get Hint</button>
              <button id="btnReveal" class="btn btn-ghost">Reveal Solution</button>
            </div>

            <div class="status" id="status">Done.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Import grid">
      <div class="modal-head">
        <div class="modal-title">Import Sudoku Grid</div>
        <button class="xbtn" data-close="1" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">
        <div class="hint">
          Paste 81 characters. Use <span class="mono">0</span> or <span class="mono">.</span> for blanks.
        </div>

        <div class="fields">
          <div class="field">
            <label for="givensBox">Givens</label>
            <textarea id="givensBox" spellcheck="false" class="textbox"></textarea>
          </div>

          <div class="field">
            <label for="currentBox">User inputs (optional)</label>
            <textarea id="currentBox" spellcheck="false" class="textbox"></textarea>
            <div class="field-note">Leave empty to start from givens.</div>
          </div>
        </div>

        <div class="row">
          <button id="btnExample" class="btn btn-ghost small">Load Example</button>
          <div class="spacer"></div>
          <button id="btnLoad" class="btn btn-primary small">Preview Board</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js?v=20260320a"></script>
</body>
</html>
